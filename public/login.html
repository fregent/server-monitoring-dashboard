<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion — Server Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script>
    // Si déjà connecté, rediriger immédiatement vers le dashboard
    fetch('/api/auth/me')
      .then(res => { if (res.ok) window.location.href = '/'; });
  </script>
  <div class="login-container">
    <div class="login-card">
      <h1>🖥️ Server Monitor</h1>
      <input type="text"     id="username" placeholder="Identifiant" />
      <input type="password" id="password" placeholder="Mot de passe" />
      <button id="btn-login">Se connecter</button>
      <p id="error-msg">Identifiants incorrects.</p>
    </div>
  </div>
  <script>
    document.getElementById('btn-login').addEventListener('click', async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
